name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # Linux/macOS build
  build-unix:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            cxx: g++
          - os: ubuntu-latest
            cxx: clang++
          - os: macos-latest
            cxx: clang++
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential clang
      
      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install cmake
      
      - name: Configure
        run: cmake -S . -B build -DRUDP_BUILD_TESTS=ON -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}
      
      - name: Build
        run: cmake --build build --config Release
      
      - name: Test
        run: |
          ./build/rudp_self_test
          ./build/rudp_reliability_test
          ./build/rudp_manager_test
          ./build/rudp_bench

  # Windows build
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -DRUDP_BUILD_TESTS=ON
      
      - name: Build
        run: cmake --build build --config Release
      
      - name: Test
        shell: powershell
        run: |
          .\build\Release\rudp_self_test.exe
          .\build\Release\rudp_reliability_test.exe
          .\build\Release\rudp_manager_test.exe
          .\build\Release\rudp_bench.exe

  # Code quality
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install clang-tidy
        run: sudo apt-get install -y clang-tidy
      
      - name: Run clang-tidy
        run: |
          cmake -S . -B build -DRUDP_BUILD_TESTS=ON
          cmake --build build --target clang-tidy

  # Coverage (Linux only)
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: sudo apt-get install -y cmake build-essential lcov
      
      - name: Configure with coverage
        run: cmake -S . -B build -DRUDP_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Debug -DCOVERAGE=ON
      
      - name: Build & Test
        run: |
          cmake --build build
          ./build/rudp_self_test
          ./build/rudp_reliability_test
          ./build/rudp_manager_test
          ./build/rudp_bench
      
      - name: Coverage Report
        run: |
          lcov --capture --directory build --output-file coverage.info
          lcov --remove coverage.info '/usr/*' --output-file filtered.info
          curl -s https://codecov.io/upload -F coverage=@filtered.info || true

  install-consume:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y cmake build-essential

      - name: Build and install package
        run: |
          cmake -S . -B build-install -DRUDP_INSTALL=ON -DRUDP_BUILD_TESTS=OFF -DRUDP_BUILD_EXAMPLES=OFF
          cmake --build build-install --config Release
          cmake --install build-install --prefix "$PWD/stage"

      - name: Configure consumer
        run: |
          cmake -S tests/install_consume -B build-consume -DCMAKE_PREFIX_PATH="$PWD/stage"

      - name: Build and run consumer
        run: |
          cmake --build build-consume --config Release
          ./build-consume/rudp_install_consume
